<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudioKay — Là où la créativité bat son plein</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ocre: #C8732A;
    --ocre-light: #E8943F;
    --gold: #D4A843;
    --noir: #0F0D0B;
    --noir-soft: #1A1713;
    --brun: #2C2015;
    --creme: #F5EFE6;
    --blanc: #FDFAF6;
    --gris: #8A7B6E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--noir);
    color: var(--blanc);
    overflow-x: hidden;
  }

  /* ── PATTERN AFRICAIN SVG ── */
  .kente-bg {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image:
      repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(-45deg, var(--ocre) 0, var(--ocre) 1px, transparent 0, transparent 50%);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 5%;
    background: linear-gradient(180deg, rgba(15,13,11,0.95) 0%, transparent 100%);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--ocre); }

  nav ul {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  nav ul a {
    text-decoration: none;
    color: var(--creme);
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0.75;
    transition: opacity 0.2s, color 0.2s;
  }

  nav ul a:hover { opacity: 1; color: var(--gold); }

  .nav-cta {
    background: var(--ocre);
    color: var(--blanc) !important;
    padding: 10px 22px;
    border-radius: 4px;
    opacity: 1 !important;
    font-weight: 600 !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--ocre-light) !important; color: var(--blanc) !important; }

  /* ── PAGE DE GARDE ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-bg-photo {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .hero-bg-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }

  /* Overlay sombre dramatique */
  .hero-bg-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(15,13,11,0.55) 0%, rgba(15,13,11,0.3) 40%, rgba(15,13,11,0.75) 80%, rgba(15,13,11,0.98) 100%),
      linear-gradient(90deg, rgba(15,13,11,0.4) 0%, transparent 60%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 5%;
    max-width: 900px;
  }

  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,115,42,0.18);
    border: 1px solid rgba(200,115,42,0.4);
    padding: 7px 18px;
    border-radius: 20px;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    width: fit-content;
    backdrop-filter: blur(8px);
  }

  .hero-label::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 7vw, 6rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 22px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  .hero h1 em {
    font-style: italic;
    color: var(--ocre);
  }

  .hero p.sub {
    font-size: 1.1rem;
    color: rgba(245,239,230,0.75);
    max-width: 520px;
    line-height: 1.75;
    margin-bottom: 40px;
    font-weight: 300;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }

  .hero-actions {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid rgba(245,239,230,0.15);
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-item strong {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }

  .stat-item span {
    font-size: 0.8rem;
    color: rgba(245,239,230,0.55);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  /* Scroll indicator */
  .scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.5;
    animation: scrollBounce 2s infinite;
  }

  .scroll-hint span {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--creme);
  }

  .scroll-hint::after {
    content: '↓';
    font-size: 1.1rem;
    color: var(--gold);
  }

  @keyframes scrollBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

    /* ── SEARCH BAR ── */
  .search-section {
    position: relative;
    z-index: 10;
    padding: 0 5%;
    margin-top: -30px;
    margin-bottom: 80px;
  }

  .search-bar {
    background: var(--noir-soft);
    border: 1px solid rgba(245,239,230,0.1);
    border-radius: 12px;
    padding: 24px 28px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .search-field {
    flex: 1;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .search-field label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gris);
    font-weight: 500;
  }

  .search-field input, .search-field select {
    background: transparent;
    border: none;
    color: var(--blanc);
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    outline: none;
    cursor: pointer;
  }

  .search-field select option { background: var(--noir-soft); }

  .search-divider {
    width: 1px;
    height: 40px;
    background: rgba(245,239,230,0.1);
  }

  .search-btn {
    background: var(--ocre);
    color: var(--blanc);
    border: none;
    padding: 14px 28px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .search-btn:hover { background: var(--ocre-light); transform: translateY(-1px); }

  /* ── SECTION GENERIC ── */
  section {
    position: relative;
    z-index: 1;
    padding: 80px 5%;
  }

  .section-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ocre);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .section-sub {
    color: var(--gris);
    font-size: 1rem;
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 48px;
  }

  /* ── CATEGORIES ── */
  .categories-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }

  .cat-pill {
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid rgba(245,239,230,0.12);
    color: var(--creme);
    background: transparent;
    letter-spacing: 0.02em;
  }

  .cat-pill.active, .cat-pill:hover {
    background: var(--ocre);
    border-color: var(--ocre);
    color: var(--blanc);
  }

  /* ── STUDIOS GRID ── */
  .studios-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }

  .studio-card {
    background: var(--noir-soft);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(245,239,230,0.06);
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    cursor: pointer;
  }

  .studio-card:hover {
    transform: translateY(-6px);
    border-color: rgba(200,115,42,0.3);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  .card-image {
    height: 220px;
    position: relative;
    overflow: hidden;
  }

  .card-image .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .g1 { background: linear-gradient(135deg, #2C1505 0%, #5C3010 50%, #8B4A1A 100%); }
  .g2 { background: linear-gradient(135deg, #051A2C 0%, #0A3050 50%, #1A5C8B 100%); }
  .g3 { background: linear-gradient(135deg, #1A0A2C 0%, #3A1050 50%, #6A208B 100%); }
  .g4 { background: linear-gradient(135deg, #0A2C15 0%, #155A2A 50%, #228B45 100%); }
  .g5 { background: linear-gradient(135deg, #2C200A 0%, #5A4010 50%, #8B6020 100%); }
  .g6 { background: linear-gradient(135deg, #2C0A15 0%, #5A1025 50%, #8B2040 100%); }

  .card-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(15,13,11,0.75);
    backdrop-filter: blur(8px);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .card-fav {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(15,13,11,0.6);
    backdrop-filter: blur(8px);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .card-fav:hover { background: rgba(200,115,42,0.5); }

  .card-body {
    padding: 20px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .card-rating {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.82rem;
    color: var(--gold);
  }

  .card-reviews { color: var(--gris); font-size: 0.78rem; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .card-location {
    font-size: 0.82rem;
    color: var(--gris);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .tag {
    font-size: 0.72rem;
    padding: 3px 10px;
    background: rgba(200,115,42,0.12);
    border: 1px solid rgba(200,115,42,0.2);
    border-radius: 20px;
    color: var(--ocre-light);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid rgba(245,239,230,0.07);
  }

  .card-price strong {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--blanc);
  }

  .card-price span { font-size: 0.8rem; color: var(--gris); }

  .card-btn {
    background: transparent;
    border: 1px solid var(--ocre);
    color: var(--ocre);
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }
  .card-btn:hover { background: var(--ocre); color: var(--blanc); }

  /* ── HOW IT WORKS ── */
  .how-section {
    background: var(--noir-soft);
    border-top: 1px solid rgba(245,239,230,0.06);
    border-bottom: 1px solid rgba(245,239,230,0.06);
  }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 40px;
    margin-top: 56px;
  }

  .step {
    position: relative;
  }

  .step-num {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    color: rgba(200,115,42,0.1);
    line-height: 1;
    margin-bottom: 16px;
    letter-spacing: -0.05em;
  }

  .step-icon {
    font-size: 1.8rem;
    margin-bottom: 16px;
    display: block;
  }

  .step h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .step p {
    font-size: 0.9rem;
    color: var(--gris);
    line-height: 1.7;
  }

  /* ── CITY HIGHLIGHTS ── */
  .cities-scroll {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 16px;
    scrollbar-width: none;
  }
  .cities-scroll::-webkit-scrollbar { display: none; }

  .city-card {
    flex: 0 0 220px;
    height: 280px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(245,239,230,0.08);
    transition: transform 0.3s;
  }

  .city-card:hover { transform: scale(1.03); }

  .city-bg {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
  }

  .cd1 { background: linear-gradient(160deg, #2C1505, #8B4A1A); }
  .cd2 { background: linear-gradient(160deg, #05202C, #1A6B8B); }
  .cd3 { background: linear-gradient(160deg, #1A0A2C, #6A208B); }
  .cd4 { background: linear-gradient(160deg, #0A2C10, #228B45); }

  .city-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 20px 20px;
    background: linear-gradient(0deg, rgba(15,13,11,0.9) 0%, transparent 100%);
  }

  .city-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .city-count {
    font-size: 0.78rem;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── CTA BANNER ── */
  .cta-banner {
    background: linear-gradient(135deg, var(--ocre) 0%, #A05A20 40%, #7A3A10 100%);
    border-radius: 16px;
    padding: 64px 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
  }

  .cta-banner::before {
    content: '';
    position: absolute;
    right: -60px;
    top: -80px;
    width: 300px;
    height: 300px;
    border: 40px solid rgba(255,255,255,0.08);
    border-radius: 50%;
  }

  .cta-banner::after {
    content: '';
    position: absolute;
    right: 80px;
    bottom: -100px;
    width: 200px;
    height: 200px;
    border: 30px solid rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .cta-text h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  .cta-text p {
    font-size: 1rem;
    opacity: 0.8;
    max-width: 400px;
  }

  .btn-white {
    background: var(--blanc);
    color: var(--ocre);
    padding: 16px 36px;
    border-radius: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    white-space: nowrap;
    position: relative;
    z-index: 1;
  }
  .btn-white:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.2); }

  /* ── TESTIMONIALS ── */
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 48px;
  }

  .testi-card {
    background: var(--noir-soft);
    border: 1px solid rgba(245,239,230,0.07);
    border-radius: 12px;
    padding: 28px;
    transition: border-color 0.3s;
  }

  .testi-card:hover { border-color: rgba(200,115,42,0.25); }

  .testi-quote {
    font-size: 2rem;
    color: var(--ocre);
    font-family: 'Playfair Display', serif;
    line-height: 1;
    margin-bottom: 14px;
  }

  .testi-text {
    font-size: 0.95rem;
    color: rgba(245,239,230,0.75);
    line-height: 1.7;
    margin-bottom: 20px;
    font-style: italic;
  }

  .testi-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .testi-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 600;
    font-family: 'Playfair Display', serif;
  }

  .av1 { background: linear-gradient(135deg, #C8732A, #8B4A1A); }
  .av2 { background: linear-gradient(135deg, #1A6B8B, #0A3050); }
  .av3 { background: linear-gradient(135deg, #6A208B, #3A1050); }

  .testi-info strong { display: block; font-size: 0.9rem; font-weight: 600; }
  .testi-info span { font-size: 0.78rem; color: var(--gris); }

  /* ── FOOTER ── */
  footer {
    background: var(--brun);
    border-top: 1px solid rgba(245,239,230,0.06);
    padding: 60px 5% 30px;
  }

  .footer-top {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 48px;
    margin-bottom: 48px;
  }

  .footer-brand .logo {
    font-size: 1.6rem;
    margin-bottom: 16px;
    display: block;
  }

  .footer-brand p {
    font-size: 0.88rem;
    color: var(--gris);
    line-height: 1.7;
    max-width: 280px;
    margin-bottom: 24px;
  }

  .social-links {
    display: flex;
    gap: 10px;
  }

  .social-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(245,239,230,0.07);
    border: 1px solid rgba(245,239,230,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .social-btn:hover { background: var(--ocre); border-color: var(--ocre); }

  .footer-col h4 {
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 20px;
  }

  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }

  .footer-col ul a {
    text-decoration: none;
    color: var(--gris);
    font-size: 0.88rem;
    transition: color 0.2s;
  }
  .footer-col ul a:hover { color: var(--creme); }

  .footer-bottom {
    padding-top: 28px;
    border-top: 1px solid rgba(245,239,230,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-bottom p { font-size: 0.82rem; color: var(--gris); }
  .footer-bottom a { color: var(--ocre); text-decoration: none; }

  .footer-yaqin {
    margin-top: 20px;
    text-align: center;
    padding-top: 16px;
    border-top: 1px solid rgba(245,239,230,0.04);
  }

  .footer-yaqin p {
    font-size: 0.78rem;
    color: rgba(138,123,110,0.5);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .footer-yaqin span {
    color: rgba(212,168,67,0.6);
    font-weight: 600;
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.12em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero h1 { animation: fadeUp 0.8s ease forwards; }
  .hero p.sub { animation: fadeUp 0.8s 0.15s ease both; }
  .hero-actions { animation: fadeUp 0.8s 0.3s ease both; }
  .hero-stats { animation: fadeUp 0.8s 0.45s ease both; }
  .hero-label { animation: fadeUp 0.8s 0s ease both; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .hero-collage { display: none; }
    nav ul { display: none; }
    .footer-top { grid-template-columns: 1fr 1fr; }
    .cta-banner { padding: 40px 32px; }
    .hero-stats { gap: 28px; }
  }

  @media (max-width: 600px) {
    .hero h1 { font-size: 2.5rem; }
    .footer-top { grid-template-columns: 1fr; }
    .search-bar { flex-direction: column; align-items: stretch; }
    .search-divider { display: none; }
    .hero-stats { flex-wrap: wrap; gap: 20px; }
  }
</style>
</head>
